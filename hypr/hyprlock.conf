source = colors.conf

general {
    ignore_empty_input = true
}

background {
    monitor =
    path = /home/mhpsy/.config/hypr/wallpapers/wallhaven-w51676.png
    blur_passes = 2
    blur_size = 4
    brightness = 0.85
}

input-field {
    monitor =
    size = 200, 50
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    inner_color = rgba(255, 255, 255, 0.15)
    font_color = rgba(255, 255, 255, 0.9)
    font_family = Fira Sans Semibold
    outer_color = rgba(255, 255, 255, 0.3)
    outline_thickness = 2
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i>Input Password...</i>
    hide_input = false
    rounding = 10
    check_color = rgba(255, 255, 255, 0.4)
    fail_color = rgba(255, 80, 80, 0.8)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    position = 0, -20
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +%H:%M)"
    color = rgba(255, 255, 255, 0.9)
    font_size = 120
    font_family = Fira Sans Semibold
    position = 0, 200
    halign = center
    valign = center
}

# Date and weekday
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%Y-%m-%d  %A')"
    color = rgba(255, 255, 255, 0.8)
    font_size = 28
    font_family = Fira Sans Semibold
    position = 0, 100
    halign = center
    valign = center
}

# User
label {
    monitor =
    text = $USER
    color = rgba(255, 255, 255, 0.7)
    font_size = 18
    font_family = Fira Sans Semibold
    position = 0, -80
    halign = center
    valign = center
}
