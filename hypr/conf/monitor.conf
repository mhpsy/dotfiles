# Monitor configuration — universal fallback (tracked, machine-agnostic).
#
# Per-machine layout (exact resolution/position/scale, workspace↔monitor
# binding) lives in ../monitors.conf + ../workspaces.conf, which are
# generated by nwg-displays and gitignored — each machine keeps its own.
#
# This catch-all rule guarantees ANY machine boots with working displays
# even before nwg-displays has run. It is sourced BEFORE the per-machine
# files, so their specific rules override it where present.
monitor = , preferred, auto, 1
