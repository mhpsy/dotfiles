# Dolphin
windowrule {
    name = dolphin
    match:class = ^(org\.kde\.dolphin)$
    float = true
    center = true
    size = 1200 750
}

# Gwenview
windowrule {
    name = gwenview
    match:class = ^(org\.kde\.gwenview)$
    float = true
    center = true
    size = 1400 900
}

# Waypaper
windowrule {
    name = waypaper
    match:class = ^(waypaper)$
    float = true
    center = true
    size = 900 600
}

# SwayNC blur
layerrule2 = blur, swaync-control-center
layerrule2 = blur, swaync-notification-window
layerrule2 = ignorezero, swaync-control-center
layerrule2 = ignorezero, swaync-notification-window
layerrule2 = ignorealpha 0.5, swaync-control-center
layerrule2 = ignorealpha 0.5, swaync-notification-window

# Pavucontrol
windowrule {
    name = pavucontrol
    match:class = (.*org.pulseaudio.pavucontrol.*)
    float = true
    center = true
    pin = true
    size = 700 600
}

# Blueman Manager
windowrule {
    name = blueman-manager
    match:class = (blueman-manager)
    float = true
    center = true
    size = 800 600
}

# Picture-in-Picture
windowrule {
    name = Picture-in-Picture
    match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
    float = true
    pin = true
    center = true
}

# Hyprland Share Picker
windowrule {
    name = hyprland-share-picker
    match:class = (hyprland-share-picker)
    float = true
    pin = true
    center = true
    size = 600 400
}

# nm-connection-editor
windowrule {
    name = nm-connection-editor
    match:class = (nm-connection-editor)
    float = true
    center = true
    size = 800 700
}

# Gnome Calculator
windowrule {
    name = gnome-calculator
    match:class = (org.gnome.Calculator)
    float = true
    center = true
    size = 700 600
}

# --- WeChat (微信) XWayland blur fix ---
# windowrule = noblur, class:wechat, title:negative:微信
# windowrule = noshadow, class:wechat, title:negative:微信
# windowrule = noborder, class:wechat, title:negative:微信

# --- WeChat (微信) 图片/视频预览 ---
windowrule {
    name = wechat-popups
    match:class = ^(wechat)$
    match:title = ^(Photos and Videos|图片查看|文件传输助手)$
    float = true
    center = true
}

# --- QQ 图片查看器 ---
windowrule {
    name = qq-popups
    match:class = ^(QQ)$
    match:title = ^(图片查看器)$
    float = true
    center = true
}

# --- Feishu (飞书) 弹窗/图片预览 ---
# 飞书图片预览标题待确认，先匹配非主窗口的常见标题
windowrule {
    name = feishu-popups
    match:class = ^(Feishu)$
    match:title = ^(ImagePreview|图片预览|图片查看|Picture)
    float = true
    center = true
}


# --- Telegram 媒体查看器 ---
windowrule {
    name = telegram-media-viewer
    match:class = ^(org\.telegram\.desktop)$
    match:title = ^(Media viewer)$
    float = true
    center = true
}
