# Dolphin (file manager)
windowrule {
    name = dolphin
    match:class = ^(org\.kde\.dolphin)$
    float = true
    center = true
    size = 1200 750
}

# Gwenview
windowrule {
    name = gwenview
    match:class = ^(org\.kde\.gwenview)$
    float = true
    center = true
    size = 1400 900
}

# Waypaper
windowrule {
    name = waypaper
    match:class = ^(waypaper)$
    float = true
    center = true
    size = 900 600
}

# Satty (screenshot annotation) — float by default
windowrule {
    name = satty
    match:class = ^(com\.gabm\.[Ss]atty|[Ss]atty)$
    float = true
    center = true
    size = 1400 900
}

# Overlay layer blur / dim
layerrule2 = blur, waybar

layerrule2 = blur, rofi
layerrule2 = ignorezero, rofi
layerrule2 = ignorealpha 0.5, rofi
layerrule2 = dimaround, rofi
layerrule2 = blur, .*[Rr]ofi.*
layerrule2 = ignorezero, .*[Rr]ofi.*
layerrule2 = ignorealpha 0.5, .*[Rr]ofi.*
layerrule2 = dimaround, .*[Rr]ofi.*

layerrule2 = blur, wlogout
layerrule2 = ignorezero, wlogout
layerrule2 = ignorealpha 0.5, wlogout
layerrule2 = dimaround, wlogout

layerrule2 = blur, swaync-control-center
layerrule2 = blur, swaync-notification-window
layerrule2 = ignorezero, swaync-control-center
layerrule2 = ignorezero, swaync-notification-window
layerrule2 = ignorealpha 0.5, swaync-control-center
layerrule2 = ignorealpha 0.5, swaync-notification-window
layerrule2 = dimaround, swaync-control-center

# Rofi can appear as a normal window on some builds.
windowrule {
    name = rofi-overlay-class
    match:class = .*[Rr]ofi.*
    float = true
    center = true
    dim_around = true
    opacity = 0.98 0.98
}

windowrule {
    name = rofi-overlay-title
    match:title = ^(rofi-launcher|rofi-clipboard)$
    float = true
    center = true
    dim_around = true
    opacity = 0.98 0.98
}

# Chat drawer apps
windowrule {
    name = chat-drawer-wechat
    match:class = ^(wechat)$
    workspace = special:chat silent
}

windowrule {
    name = chat-drawer-telegram
    match:class = ^(org\.telegram\.desktop)$
    workspace = special:chat silent
}

windowrule {
    name = chat-drawer-discord
    match:class = ^([Dd]iscord)$
    workspace = special:chat silent
}

# Entertainment drawer apps
windowrule {
    name = entertainment-drawer-splayer
    match:class = ^(SPlayer)$
    workspace = special:entertainment silent
}

# Pavucontrol
windowrule {
    name = pavucontrol
    match:class = (.*org.pulseaudio.pavucontrol.*)
    float = true
    center = true
    pin = true
    size = 700 600
}

# Blueman Manager
windowrule {
    name = blueman-manager
    match:class = (blueman-manager)
    float = true
    center = true
    size = 800 600
}

# Picture-in-Picture
windowrule {
    name = Picture-in-Picture
    match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
    float = true
    pin = true
    center = true
}

# Hyprland Share Picker
windowrule {
    name = hyprland-share-picker
    match:class = (hyprland-share-picker)
    float = true
    pin = true
    center = true
    size = 600 400
}

# nm-connection-editor
windowrule {
    name = nm-connection-editor
    match:class = (nm-connection-editor)
    float = true
    center = true
    size = 800 700
}

# Gnome Calculator
windowrule {
    name = gnome-calculator
    match:class = (org.gnome.Calculator)
    float = true
    center = true
    size = 700 600
}

# Ghostty (默认使用 kitty，ghostty 仅用于弹窗类 TUI 如 bluetuith)
windowrule {
    name = ghostty
    match:class = ^(com\.mitchellh\.ghostty)$
    float = true
    center = true
    size = 1000 650
}

# --- Electron popup ghosting fix (WeChat & Claude Desktop) ---
# XWayland override-redirect popup（菜单/工具提示）class 和 title 都是空的
# 只对 popup 本身禁用装饰，不动主窗口（保持原本的 blur/opacity 视觉效果）
windowrule {
    name = xwayland-empty-popup-no-decoration
    match:class = ^$
    match:xwayland = 1
    no_shadow = on
    no_blur = on
    no_anim = on
    no_dim = on
    rounding = off
}

# --- Fcitx5 输入法候选窗 ---
# 去掉 Hyprland 给它画的边框/阴影/圆角，并 pin 起来跨工作区显示
# （否则在 special workspace 的 WeChat 里候选窗会被压在底层不可见）
windowrule {
    name = fcitx5-input-window
    match:title = ^(Fcitx5 Input Window)$
    border_size = 0
    no_shadow = on
    no_blur = on
    no_anim = on
    no_dim = on
    rounding = off
    pin = true
}


# --- WeChat (微信) 图片/视频预览 ---
windowrule {
    name = wechat-popups
    match:class = ^(wechat)$
    match:title = ^(Photos and Videos|图片查看|文件传输助手)$
    float = true
    center = true
}

# --- QQ 图片查看器 ---
windowrule {
    name = qq-popups
    match:class = ^(QQ)$
    match:title = ^(图片查看器)$
    float = true
    center = true
}

# --- Feishu (飞书) 弹窗/图片预览 ---
# 飞书图片预览标题待确认，先匹配非主窗口的常见标题
windowrule {
    name = feishu-popups
    match:class = ^(Feishu)$
    match:title = ^(ImagePreview|图片预览|图片查看|Picture)
    float = true
    center = true
}


# --- Telegram 媒体查看器 ---
windowrule {
    name = telegram-media-viewer
    match:class = ^(org\.telegram\.desktop)$
    match:title = ^(Media viewer)$
    float = true
    center = true
}
