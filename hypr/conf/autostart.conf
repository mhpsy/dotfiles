# Polkit
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Notification daemon
exec-once = swaync

# Wallpaper (restore whatever waypaper currently points at)
exec-once = swww-daemon
exec-once = bash -c 'for i in {1..30}; do swww query >/dev/null 2>&1 && break; sleep 0.2; done; waypaper --restore'

# Idle management
exec-once = hypridle

# Clipboard history
exec-once = wl-paste --watch cliphist store

# StatusNotifierWatcher (tray support)
exec-once = dbus-send --session --print-reply --dest=org.kde.kded6 /kded org.kde.kded6.loadModule string:statusnotifierwatcher

# Status bar
exec-once = ~/.config/waybar/launch.sh

# Input method
exec-once = fcitx5 -d
