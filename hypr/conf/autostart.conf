# Polkit
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Notification daemon
exec-once = swaync

# Wallpaper (restore whatever waypaper currently points at)
exec-once = swww-daemon
exec-once = bash -c 'for i in {1..30}; do swww query >/dev/null 2>&1 && break; sleep 0.2; done; waypaper --restore'
# Re-apply wallpaper when an external monitor is hotplugged
exec-once = ~/.config/hypr/scripts/wallpaper-hotplug.sh

# Idle management
exec-once = hypridle

# Clipboard history
exec-once = wl-paste --watch cliphist store

# StatusNotifierWatcher (tray support)
exec-once = dbus-send --session --print-reply --dest=org.kde.kded6 /kded org.kde.kded6.loadModule string:statusnotifierwatcher

# Status bar — quickshell-native, top-anchored. Folds in all the standalone
# islands (weather, word) and replaces waybar entirely.
exec-once = qs -c bar
# Legacy (kept commented for one release cycle in case rollback is needed):
# exec-once = ~/.config/waybar/launch.sh
# exec-once = qs -c word-island       # folded into bar (Quotes pill + WordCard popup)
# exec-once = qs -c weather-island    # folded into bar (Weather pill + WeatherCard popup)

# Input method
exec-once = fcitx5 -d
